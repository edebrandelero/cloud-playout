services:
  playout:
    build: .
    image: cloud-playout:latest
    container_name: cloud-playout
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_PATH: /app/data/cloud-playout.db
      MEDIA_ROOT: /app/media
      HLS_OUTPUT_DIR: /app/output/hls
      REQUIRE_AUTH: "true"
    volumes:
      - playout-data:/app/data
      - playout-media:/app/media
      - playout-output:/app/output
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  playout-data:
  playout-media:
  playout-output:
